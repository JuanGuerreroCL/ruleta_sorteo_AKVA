<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sorteo AKVA group Chile - Digita</title>
  <link rel="icon" type="image/x-icon" href="assets/fish-icon-white.ico" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800&display=swap" rel="stylesheet" />
  <!-- Akvarell: sistema de diseño / librería de componentes de AKVA -->
  <link rel="stylesheet" href="https://akvagroup.github.io/akvarell/styles.css" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="topbar">
    <img class="logo" src="assets/akva-group-logo-white.svg" alt="AKVA group" width="200" height="56" />
    <h1>Ruleta de Sorteo</h1>
    <p class="subtitle">Gira la ruleta y descubre al ganador...</p>
  </header>

  <main class="layout">
    <!-- Columna izquierda: ganadores -->
    <aside class="panel winners-panel">
      <h2>Ganadores:</h2>
      <ol id="winnersList" class="winners"></ol>
    </aside>

    <!-- Columna central: la ruleta -->
    <section class="wheel-section">
      <div class="wheel-wrap">
        <div class="pointer" aria-hidden="true"></div>
        <canvas id="wheel" width="1000" height="1000" role="img" aria-label="Ruleta de participantes"></canvas>
        <button id="spinBtn" class="spin-center" type="button">
          <img class="spin-fish" src="assets/fish-icon-white.ico" alt="" aria-hidden="true" />
          <span>GIRAR</span>
        </button>
      </div>

    </section>

    <!-- Columna derecha: carga y lista de participantes -->
    <aside class="panel">
      <h2>Participantes (<span id="count">0</span>)</h2>

      <details class="manual">
        <summary>Editar manualmente</summary>
        <p class="hint">Un nombre completo por línea.</p>
        <textarea id="namesInput" class="textarea" spellcheck="false" placeholder="Juan Pérez
María González
..."></textarea>
        <div class="panel-actions">
          <button id="applyBtn" class="button" data-color="secondary" type="button">Actualizar ruleta</button>
          <button id="shuffleBtn" class="button" data-color="secondary" data-variant="plain" type="button">Mezclar</button>
          <button id="resetBtn" class="button" data-color="danger" data-variant="plain" type="button">↺ Limpiar</button>
        </div>
      </details>

      <details class="config">
        <summary>Configuración</summary>
        <label class="switch">
          <input type="checkbox" id="removeWinner" class="checkbox" checked />
          <span>Quitar al ganador tras girar</span>
        </label>
        <label class="switch">
          <input type="checkbox" id="soundOn" class="checkbox" checked />
          <span>Sonido</span>
        </label>
        <label class="volume-control">
          <span>Volumen</span>
          <input type="range" id="volume" min="0" max="100" value="70" />
        </label>
        <label class="config-row">
          <span>Segundos de giro</span>
          <input type="number" id="spinSeconds" class="input" min="5" max="120" value="20" />
        </label>
        <label class="config-row">
          <span>Número de premios</span>
          <input type="number" id="prizeCount" class="input" min="1" max="50" value="3" />
        </label>
      </details>
    </aside>
  </main>

  <!-- Modal del ganador -->
  <div id="winnerModal" class="modal" aria-hidden="true">
    <div class="modal-card">
      <div class="confetti" id="confetti"></div>
      <div class="modal-head">
        <p class="modal-label"> Ganador</p>
        <span class="modal-sep">·</span>
        <p id="winnerPrize" class="modal-prize"> premio 1</p>
      </div>
      <p id="winnerName" class="modal-name">—</p>
      <img id="winnerGif" class="modal-gif" src="https://media.tenor.com/NRvAuY9ug-gAAAAd/applause-clapping.gif" alt="Aplausos" />
      <button id="closeModal" class="button" data-color="primary" data-size="large" type="button">Continuar</button>
    </div>
  </div>

  <footer class="footer">
    <span>Ruleta de Sorteo AKVA group Chile · Digital Farming</span>
  </footer>

  <script src="script.js"></script>
</body>
</html>
